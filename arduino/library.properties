sentence=On-device neural text-to-speech: a portable C99 int8 iSTFT engine wrapped for Arduino/PlatformIO.
paragraph=Runs the ~745k-parameter saanoTTS voice (~680 KB int8 weights) entirely on-chip, no network, no phonemizer beyond feeding it Piper phoneme ids. Measured 0.22x real-time on ESP32-S3 with the full esp-nn SIMD port (documented pointer, not bundled here); this library ships the portable scalar reference runtime plus the sibilant-fricative-noise fix and an optional bigger-voice int8 decoder path. See README for per-board memory requirements.
